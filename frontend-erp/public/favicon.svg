<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#312e81"/>
    </linearGradient>
    <linearGradient id="icon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="21" x2="64" y2="21" stroke="#4338ca" stroke-width="0.5" opacity="0.4"/>
  <line x1="0" y1="43" x2="64" y2="43" stroke="#4338ca" stroke-width="0.5" opacity="0.4"/>
  <line x1="21" y1="0" x2="21" y2="64" stroke="#4338ca" stroke-width="0.5" opacity="0.4"/>
  <line x1="43" y1="0" x2="43" y2="64" stroke="#4338ca" stroke-width="0.5" opacity="0.4"/>

  <!-- Bar chart icon (ERP/management feel) -->
  <rect x="10" y="38" width="9" height="14" rx="2" fill="url(#accent)" opacity="0.7"/>
  <rect x="22" y="28" width="9" height="24" rx="2" fill="url(#accent)" opacity="0.85"/>
  <rect x="34" y="20" width="9" height="32" rx="2" fill="url(#icon)"/>
  <rect x="46" y="32" width="8" height="20" rx="2" fill="url(#accent)" opacity="0.6"/>

  <!-- Upward trend line on top of bars -->
  <polyline points="14,36 27,26 38,18 50,30" fill="none" stroke="#c7d2fe" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <!-- Dot at peak -->
  <circle cx="38" cy="18" r="2.5" fill="#e0e7ff"/>

  <!-- "FS" letters at the top inside -->
  <text x="8" y="15" font-family="'Arial', sans-serif" font-weight="900" font-size="10" fill="#c7d2fe" letter-spacing="1" opacity="0.95">FS</text>
  <text x="28" y="15" font-family="'Arial', sans-serif" font-weight="400" font-size="7" fill="#818cf8" letter-spacing="0.5" opacity="0.8">ERP</text>
</svg>
